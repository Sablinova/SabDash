<nav class="main-nav">
    <div class="nav-left">
        <a href="{{ url_for('base.index') }}" class="nav-brand">
            <img src="{{ url_for('static', filename='img/logo.png') }}" alt="" class="nav-logo">
            <span class="nav-title">SABDASH</span>
        </a>
    </div>
    <div class="nav-links">
        <a href="{{ url_for('base.index') }}" class="nav-link {% if request.endpoint == 'base.index' %}active{% endif %}">DASHBOARD</a>
        <a href="{{ url_for('base.commands') }}" class="nav-link {% if request.endpoint == 'base.commands' %}active{% endif %}">COMMANDS</a>
    </div>
    <div class="nav-right">
        {% if current_user.is_authenticated %}
        <div class="nav-user">
            <img src="{{ current_user.display_avatar }}" alt="" class="nav-avatar">
            <span class="nav-username">{{ current_user.display_name }}</span>
        </div>
        <a href="{{ url_for('login.logout') }}" class="nav-link nav-logout">LOGOUT</a>
        {% else %}
        <a href="{{ url_for('login.login_page') }}" class="nav-link nav-login">LOGIN</a>
        {% endif %}
    </div>
</nav>
