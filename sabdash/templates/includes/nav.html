<nav>
  <a href="{{ url_for('base.index') }}" class="nav-logo">
    <img src="{{ url_for('static', filename='img/logo.png') }}" alt="Sablinova">
    <span>SABDASH</span>
  </a>
  <button class="nav-toggle" id="navToggle" aria-label="Menu">
    <span></span><span></span><span></span>
  </button>
  <div class="nav-links" id="navLinks">
    <a href="{{ url_for('base.index') }}" {% if request.endpoint == 'base.index' %}class="active"{% endif %}>Dashboard</a>
    <a href="{{ url_for('base.commands') }}" {% if request.endpoint == 'base.commands' %}class="active"{% endif %}>Commands</a>
    {% if bot and bot.get('invite_url') %}
    <a href="{{ bot.invite_url }}" target="_blank">Invite</a>
    {% endif %}
    {% if current_user.is_authenticated %}
    <a href="#">Guilds</a>
    {% endif %}
  </div>
  <div class="nav-right">
    {% if current_user.is_authenticated %}
    <div class="nav-user">
      <img src="{{ current_user.display_avatar }}" alt="" class="nav-avatar">
      <span class="nav-username">{{ current_user.display_name }}</span>
    </div>
    <a href="{{ url_for('login.logout') }}">Logout</a>
    {% else %}
    <a href="{{ url_for('login.login_page') }}">Login</a>
    {% endif %}
  </div>
</nav>
